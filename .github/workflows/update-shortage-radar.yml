name: Weekly Shortage Radar Update

on:
  # 每週一 UTC 01:00（台灣時間週一 09:00）自動執行
  schedule:
    - cron: "0 1 * * 1"
  # 允許手動觸發
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: shortage-radar/requirements.txt

      - name: Install Python dependencies
        working-directory: shortage-radar
        run: pip install -r requirements.txt

      - name: Run Shortage Radar pipeline
        working-directory: shortage-radar
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: PYTHONPATH=. python -m pipeline.main

      - name: Copy JSON to dashboard data
        run: |
          cp shortage-radar/data/output/shortage_signals.json dashboard/data/web/shortage_signals.json
          echo "Copied shortage_signals.json → dashboard/data/web/"

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shortage-radar/data/output/shortage_signals.json
          git add shortage-radar/data/output/shortage_report.html
          git add dashboard/data/web/shortage_signals.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly shortage-radar data refresh $(date -u +%Y-%m-%d)"
            git push
          fi
