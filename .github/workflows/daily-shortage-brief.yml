name: Daily Shortage Brief

# 必要 Actions secrets（缺一不可，否則 job 會 exit 1）：
#   - FRED_API_KEY   管線必填（與 .env 相同）
#   - EIA_API_KEY    選填
#   - SMTP_HOST/PORT/USER/PASS, BRIEF_TO  寄信必填
#   - DASHBOARD_URL  選填（信件內連結）
# 註：GitHub 對「未建立的 secret」會傳空字串；程式已對空的 SMTP_PORT 回退 587。

on:
  # 每日 UTC 04:30 = 柏林夏令 06:30 / 冬令 05:30
  schedule:
    - cron: "30 4 * * *"
  # 手動觸發（測試 / 補跑）
  workflow_dispatch:

jobs:
  brief:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: shortage-radar/requirements.txt

      - name: Install Python dependencies
        working-directory: shortage-radar
        run: pip install -r requirements.txt

      # ── 1. 跑 pipeline（fetch + score + render）；main.py 會自動先備份 .prev.json ──
      - name: Run Shortage Radar pipeline
        working-directory: shortage-radar
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: PYTHONPATH=. python -m pipeline.main

      # ── 2. 同步 JSON 到 dashboard/data/web/ ──
      - name: Sync JSON to dashboard
        run: |
          cp shortage-radar/data/output/shortage_signals.json dashboard/data/web/shortage_signals.json
          echo "Synced shortage_signals.json → dashboard/data/web/"

      # ── 3. 產生 Markdown 早報並透過 SMTP 寄出 ──
      - name: Generate and send daily brief
        working-directory: shortage-radar
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          BRIEF_TO: ${{ secrets.BRIEF_TO }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: PYTHONPATH=. python -m pipeline.daily_brief --send

      # ── 4. Commit 更新後的資料檔 ──
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shortage-radar/data/output/shortage_signals.json
          git add shortage-radar/data/output/shortage_signals.prev.json
          git add shortage-radar/data/output/shortage_report.html
          git add shortage-radar/data/output/daily_brief.md
          git add "shortage-radar/data/output/snapshots/"
          git add dashboard/data/web/shortage_signals.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily shortage-radar refresh $(date -u +%Y-%m-%d)"
            git push
          fi
